<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DigiGrads Lunch Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- App styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="app-header">
    <div class="header-text">
      <h1>DigiGrads Lunch Rankings</h1>
      <p>Discover the best lunch spots around Melbourne CBD</p>
    </div>
  </header>

  <main class="app-shell">
    <aside class="sidebar">
      <div class="card">
        <label for="scoreFilter">Minimum score</label>
        <div class="range-row">
          <input
            type="range"
            id="scoreFilter"
            min="0"
            max="5"
            step="0.1"
            value="0"
          />
          <span id="scoreValue">0.0</span>
        </div>
      </div>

      <div class="card leaderboard">
        <h2>Leaderboard</h2>
        <ol id="leaderboard"></ol>
      </div>
    </aside>

    <section id="map"></section>
  </main>

  <!-- Leaflet JS (LOAD ONCE, HERE) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Your map logic -->
  <script src="map.js"></script>
</body>
</html>
