<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lunch Rankings Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <h1>DigiGrads Lunch Rankings</h1>
  <label>
    Minimum score:
    <input id="minScore" type="range" min="0" max="5" step="0.1" value="0" />
    <span id="minScoreValue">0.0</span>
  </label>
</header>
<main>
  <div id="map"></div>
  <aside>
    <h2>Leaderboard</h2>
    <ol id="list"></ol>
  </aside>
</main>
<script src="app.js"></script>
</body>
</html>
